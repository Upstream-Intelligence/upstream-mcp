name: Bug report
description: Report a bug in upstream-mcp
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: MCP version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: claude
    attributes:
      label: Claude client
      placeholder: e.g. Claude Code 2.1.5 or Claude Desktop 1.4.2
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: The prompt that triggered the bug
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected response
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual response
    validations:
      required: true
